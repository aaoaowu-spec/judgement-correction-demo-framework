<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>判断并改错录入 Demo 框架</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <div class="shell">
      <header class="header">
        <button class="icon-btn" title="返回" aria-label="返回">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 19 3 12l7-7"/><path d="M4 12h16"/></svg>
        </button>
        <h1>判断并改错录入</h1>
        <button class="save-btn" id="saveBtn">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
          保存
        </button>
      </header>

      <div class="layout">
        <aside class="sidebar" aria-label="页面导航">
          <button class="side-item active" data-target="recognition">
            <span class="side-icon">◎</span>
            智能识别
          </button>
          <button class="side-item" data-target="prompt">
            <span class="side-icon">●</span>
            作答提示
          </button>
          <button class="side-item" data-target="material">
            <span class="side-icon">▰</span>
            材料
          </button>
          <button class="side-item question-toggle" data-target="questions" aria-expanded="true">
            <span class="side-icon question-doc">▤</span>
            题目
            <span class="chevron">⌃</span>
          </button>
          <div class="question-sublist" id="questionSublist"></div>
          <button class="side-item" data-target="analysis">
            <span class="side-icon">▤</span>
            整题解析
          </button>
        </aside>

        <main class="content" id="content">
          <section class="block" id="recognition" data-nav-label="智能识别">
            <div class="block-head">
              <h2>智能识别</h2>
              <div class="block-actions">
                <button class="ghost-btn" id="clearRecognition">一键清空</button>
                <button class="ghost-btn" id="startRecognition">开始识别</button>
              </div>
            </div>
            <textarea class="recognition-box" id="recognitionText" placeholder="功能暂未开放..."></textarea>
          </section>

          <section class="block" id="prompt" data-nav-label="作答提示">
            <h2>作答提示</h2>
            <div class="editor-shell" data-field="prompt"></div>
          </section>

          <section class="block" id="material" data-nav-label="材料">
            <h2>材料</h2>
            <div class="editor-shell" data-field="material"></div>
          </section>

          <section class="block questions-block" id="questions" data-nav-label="题目">
            <div class="section-top">
              <h2>题目</h2>
              <button class="add-btn" id="addQuestionTop">
                <span>＋</span>
                添加小题
              </button>
            </div>
            <div class="ng-control">
              <div>
                <strong>包含 Not Given 选项</strong>
                <span>开启后当前大题下所有小题支持 T / F / NG 三选一</span>
              </div>
              <label class="switch ng-switch">
                <input type="checkbox" id="ngToggle">
                <i></i>
              </label>
            </div>
            <div id="questionList"></div>
            <button class="add-btn bottom" id="addQuestionBottom">
              <span>＋</span>
              添加小题
            </button>
          </section>

          <section class="block" id="analysis" data-nav-label="整题解析">
            <h2>整题解析</h2>
            <div class="editor-shell" data-field="wholeAnalysis"></div>
          </section>
        </main>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">已保存</div>

  <template id="editorTemplate">
    <div class="editor">
      <div class="toolbar" aria-label="富文本工具条">
        <button title="撤销">↶</button>
        <button title="重做">↷</button>
        <button title="复制">▧</button>
        <button title="粘贴">▣</button>
        <button title="橡皮">▱</button>
        <select title="字体">
          <option>Alibaba Pu...</option>
          <option>Noto Sans JP</option>
          <option>Microsoft YaHei</option>
        </select>
        <select title="字号">
          <option>20</option>
          <option>16</option>
          <option>18</option>
          <option>24</option>
        </select>
        <select title="行高">
          <option>1.5</option>
          <option>1.0</option>
          <option>2.0</option>
        </select>
        <button title="文字颜色" class="mark-blue">A</button>
        <button title="高亮">◩</button>
        <button title="加粗">B</button>
        <button title="斜体"><i>I</i></button>
        <button title="下划线"><u>U</u></button>
        <button title="删除线">S</button>
        <button title="上标">X²</button>
        <button title="下标">X₂</button>
        <button title="左对齐">☰</button>
        <button title="居中">≡</button>
        <button title="右对齐">☷</button>
        <button title="项目符号">☷</button>
        <button title="编号">½</button>
        <button title="音频">♬</button>
        <button title="公式">Σ</button>
        <button title="音标">ā</button>
        <button title="表格">▦</button>
        <button title="图片">▧</button>
        <button title="音频文件">▣</button>
        <button title="视频">▻</button>
        <button title="文件夹">□</button>
        <button title="链接">∞</button>
      </div>
      <div class="editable" contenteditable="true"></div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
